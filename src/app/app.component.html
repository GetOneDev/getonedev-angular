@if (showIntro()) {
  <div class="intro-overlay" [class.fading-out]="introFadingOut()">
    <img
      class="intro-logo"
      src="assets/logo - Copy.png"
      alt="GetOneDev"
      [class.visible]="logoVisible()"
    />
    <div class="intro-progress-bar">
      <div class="intro-progress-fill" [style.width.%]="introProgress()"></div>
    </div>
    <span class="intro-percent">{{ introProgress() }}%</span>
  </div>
}

<canvas class="matrix-bg" #matrixCanvas></canvas>

<header class="navbar" [class.scrolled]="false">
  <nav>
    <a class="nav-logo" (click)="scrollTo('hero')">
      <img src="assets/logo - Copy.png" alt="GetOneDev" class="nav-logo-img" />
    </a>

    <div class="nav-links" [class.open]="mobileMenuOpen()">
      <button class="mobile-close" (click)="toggleMobileMenu()" aria-label="Close menu">&times;</button>
      <ol>
        <li><a (click)="scrollTo('about')" [class.active]="activeSection() === 'about'">About</a></li>
        <li><a (click)="scrollTo('experience')" [class.active]="activeSection() === 'experience'">Experience</a></li>
        <li><a (click)="scrollTo('work')" [class.active]="activeSection() === 'work'">Work</a></li>
        <li><a (click)="scrollTo('services')" [class.active]="activeSection() === 'services'">Services</a></li>
        <li><a (click)="scrollTo('contact')" [class.active]="activeSection() === 'contact'">Contact</a></li>
      </ol>
      <a class="accent-btn nav-resume-btn" href="mailto:nabeel@getonedev.com">Say Hello</a>
    </div>

    <button class="hamburger" (click)="toggleMobileMenu()" [attr.aria-label]="'Toggle menu'" [class.active]="mobileMenuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
</header>

@if (mobileMenuOpen()) {
  <div class="mobile-backdrop" (click)="toggleMobileMenu()"></div>
}

<main>
  <app-home id="hero"></app-home>
  <app-about id="about" appFadeIn></app-about>
  <app-experience id="experience" appFadeIn></app-experience>
  <app-portfolio id="work" appFadeIn></app-portfolio>
  <app-services id="services" appFadeIn></app-services>
  <app-contact id="contact" appFadeIn></app-contact>
</main>

<div class="social-sidebar left">
  <ul>
    <li><a href="https://github.com/nsiddiqui25" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="bi bi-github"></i></a></li>
    <li><a href="https://www.linkedin.com/in/nsiddiqui25/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a></li>
  </ul>
</div>

<div class="social-sidebar right">
  <a (click)="scrollTo('contact')" style="cursor: pointer;">nabeel&#64;getonedev.com</a>
</div>

<footer>
  <div class="footer-social">
    <a href="https://github.com/nsiddiqui25" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="bi bi-github"></i></a>
    <a href="https://www.linkedin.com/in/nsiddiqui25/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
    <a href="mailto:nabeel@getonedev.com" aria-label="Email"><i class="bi bi-envelope"></i></a>
  </div>
  <p>Designed &amp; Built by Nabeel Siddiqui</p>
  <p class="copyright">&copy; 2025 GetOneDev, LLC</p>
</footer>
