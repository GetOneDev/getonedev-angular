<section class="contact-section">
  <h2 class="section-heading"><span class="number">05.</span> Get In Touch</h2>

  <div class="contact-content">
    <h3 class="contact-title">What's Next?</h3>
    <p class="contact-intro">
      I'm currently open for freelance opportunities and interesting projects.
      Whether you have a question, a project idea, or just want to say hello -
      my inbox is always open. Let's build something great together.
    </p>

    <div class="contact-form-wrapper">
      <form (ngSubmit)="onSubmit(contactForm)" #contactForm="ngForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              [(ngModel)]="formData.name"
              required
              placeholder="Your name"
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="formData.email"
              required
              placeholder="your@email.com"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="inquiryType">Inquiry Type</label>
          <select
            id="inquiryType"
            name="inquiryType"
            [(ngModel)]="formData.inquiryType"
            required
          >
            <option value="" disabled selected>Select an option</option>
            <option value="general">General Inquiry</option>
            <option value="project">Project Inquiry</option>
            <option value="support">Support</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            [(ngModel)]="formData.message"
            required
            placeholder="What's on your mind?"
          ></textarea>
        </div>

        <button type="submit" class="accent-btn submit-btn" [disabled]="sending || !contactForm.form.valid">
          {{ sending ? 'Sending...' : 'Send Message' }}
        </button>

        @if (submitError) {
          <p class="error-message">{{ submitError }}</p>
        }
      </form>
    </div>

    <div class="social-links">
      <a href="https://github.com/nsiddiqui25" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="bi bi-github"></i>
      </a>
      <a href="https://www.linkedin.com/in/nsiddiqui25/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <i class="bi bi-linkedin"></i>
      </a>
      <a href="mailto:nabeel@getonedev.com" aria-label="Email">
        <i class="bi bi-envelope"></i>
      </a>
    </div>
  </div>
</section>
